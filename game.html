<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laravel Snake | Falah.</title>
    <link rel="icon" type="image/svg+xml" href="assets/imgs/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
        .game3d-wrapper {
            width: 100%;
            height: calc(100vh - 80px); /* Fill screen below nav */
            position: relative;
            background: #0a0c10;
            overflow: hidden;
            border-top: 1px solid var(--border);
        }
        #game3dContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            outline: none;
        }
        /* HUD UI */
        .game3d-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        .g-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(17, 20, 24, 0.85);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            text-align: center;
            pointer-events: auto;
            color: white;
            min-width: 320px;
        }
        .g-overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        .g-overlay p {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
        }
        .g-hud {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .g-lives {
            color: #ef4444;
        }
        
        main.pt-navbar { padding-top: 80px; }
        footer { display: none; } /* Hide footer on full-screen game */
    </style>
</head>
<body data-theme="dark">
    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="loader-text">Falah<span>.</span></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">Falah.</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Portfolio</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-right">
                <i class="fas fa-sun theme-icon" id="themeIcon"></i>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-navbar">
        <div class="game3d-wrapper">
            <div id="game3dContainer" tabindex="-1"></div>
        </div>
    </main>

    <!-- Global Elements -->
    <div class="floating-cta">
        <a href="https://wa.me/6282137609530" target="_blank" class="cta-btn"><i class="fab fa-whatsapp"></i></a>
        <a href="mailto:ahmadmathlaulfalah14@gmail.com" class="cta-btn"><i class="fas fa-envelope"></i></a>
    </div>

    <!-- AI Chatbot (Reused across pages) -->
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-panel hidden" id="chatbotPanel">
            <!-- Bot UI -->
            <div class="chatbot-header">
                <div class="chatbot-avatar"><div class="bot-status"></div><i class="fas fa-robot"></i></div>
                <div><h4>Falah Bot</h4><span class="status-text">Online</span></div>
                <button class="close-chat" id="closeChatBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="chatbot-messages" id="chatbotMessages"></div>
            <div class="chatbot-input-area">
                <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
                <button id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="chatbot-toggle" id="chatbotToggle"><i class="fas fa-comment-dots"></i></button>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/chatbot.js"></script>
    <script src="assets/js/game3d.js"></script>
</body>
</html>
