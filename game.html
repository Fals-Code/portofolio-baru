<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Code Runner | Falah.</title>
    <link rel="icon" type="image/svg+xml" href="assets/imgs/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0c14;
            font-family: 'Syne', sans-serif;
        }

        #game3dContainer {
            position: fixed;
            inset: 0;
            outline: none;
        }

        /* ── HUD ─────────────────────────────────── */
        .game3d-ui {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        .g-hud {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: stretch;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            height: 54px;
        }
        .g-hud > div { display: flex; flex-direction: column; justify-content: center; padding: 0 1.25rem; }
        .g-hud-center { flex: 1; align-items: center; }
        .g-hud-right { margin-left: auto; border-left: 1px solid rgba(255,255,255,0.06); align-items: center; flex-direction: row !important; gap: 0.6rem; pointer-events: auto; }
        .g-hud-left { border-right: 1px solid rgba(255,255,255,0.06); }
        .g-score-val { font-size: 1.3rem; font-weight: 800; line-height: 1; }
        .g-score-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.45; font-weight: 600; margin-top: 2px; }
        .g-level-badge { font-size: 0.75rem; padding: 0.2rem 0.8rem; border-radius: 99px; border: 1px solid; font-weight: 700; }
        .g-speed { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.45; margin-top: 4px; }
        .g-lives { color: #ef4444; font-size: 0.95rem; }
        .g-lives i { margin: 0 1px; }

        /* HUD icon buttons */
        .g-icon-btn {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .g-icon-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .g-back-btn {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem;
            text-decoration: none;
            padding: 0 0.75rem;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.06);
            pointer-events: auto;
            transition: color 0.2s;
        }
        .g-back-btn:hover { color: #fff; }

        /* ── Overlays ─────────────────────────────── */
        .g-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(6, 8, 14, 0.93);
            backdrop-filter: blur(24px);
            padding: 3rem 3.5rem;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            pointer-events: auto;
            color: white;
            min-width: 340px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }
        .g-logo {
            font-size: 2.6rem; font-weight: 800; margin-bottom: 0.4rem;
        }
        .g-sub { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-bottom: 1.5rem; line-height: 1.65; }
        .g-controls {
            display: flex; gap: 1.25rem; justify-content: center;
            margin-bottom: 2rem; flex-wrap: wrap;
        }
        .g-controls span { font-size: 0.78rem; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 5px; }
        kbd {
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px; padding: 2px 7px;
            font-size: 0.72rem; font-family: monospace;
        }
        .g-btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
        .g-btn {
            display: inline-flex; align-items: center; gap: 0.6rem;
            padding: 0.9rem 2rem; border-radius: 99px;
            border: none; cursor: pointer;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
            color: white; width: 100%; justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }
        .g-btn:hover { transform: scale(1.04); opacity: 0.9; }
        .g-btn-sec {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .g-hs { font-size: 0.8rem; color: rgba(255,255,255,0.28); margin-top: 1.25rem; }
        .g-new-record {
            display: inline-block; background: rgba(234,179,8,0.14);
            color: #fcd34d; border: 1px solid rgba(234,179,8,0.3);
            padding: 0.3rem 1rem; border-radius: 99px;
            font-size: 0.85rem; font-weight: 700; margin-bottom: 1rem;
        }
        .g-final-score {
            font-size: 4.5rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem;
        }

        /* Pause overlay */
        .g-pause-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .g-pause-card {
            background: rgba(6,8,14,0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 2.5rem 3rem;
            text-align: center; color: white;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .g-pause-card h2 { font-size: 2rem; margin-bottom: 0.5rem; }
        .g-pause-card p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 1.5rem; }

        /* Level-up notification */
        .g-levelup-notif {
            position: absolute; top: 80px; left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem; font-weight: 800;
            pointer-events: none;
            text-shadow: 0 0 20px currentColor;
            animation: notifPop 2.2s ease forwards;
        }
        @keyframes notifPop {
            0%   { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.8); }
            15%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.12); }
            70%  { opacity: 1; transform: translateX(-50%) translateY(-15px) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.9); }
        }

        @media (max-width: 480px) {
            .g-overlay { min-width: 90vw; padding: 2rem 1.5rem; }
            .g-logo { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    <div id="game3dContainer" tabindex="-1"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/game3d.js"></script>
</body>
</html>
